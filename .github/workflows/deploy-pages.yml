name: Deploy SuperSXO Public Alpha

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run quality gate (pre-build)
        run: python scripts/quality_gate.py

      - name: Build site
        run: python scripts/build.py

      - name: Validate deploy assets (strict post-build)
        run: python scripts/validate_deploy_assets.py --strict

      - name: Run quality gate (post-build)
        run: python scripts/quality_gate.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
