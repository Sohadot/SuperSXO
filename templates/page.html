<div class="route-status-strip">
  <div class="route-status-strip-inner">
    <span class="route-status-indicator" aria-hidden="true"></span>
    <span class="route-status-label">Examination Active</span>
    <code class="route-status-path">{{ route_path }}</code>
  </div>
</div>

<div class="route-context-zone">
  {{ route_context }}
</div>

<article class="command-console page-command-panel" data-route="{{ route_path }}">

  <header class="console-identity page-signal-header">
    <div class="system-label">Adjudication System &mdash; Examination Record</div>
    <h1 class="page-heading">{{ page_heading }}</h1>
    <p class="page-summary">{{ page_summary }}</p>
  </header>

  {{ sxo_diagnostic_environment }}

  <div class="content-instrument-area content-control-deck content-deck">
    {{ page_body }}
  </div>

  <nav class="diagnostic-readout governed-action-routes related-routes-panel" aria-label="Continue examination">
    <h2 class="action-routes-label related-routes-label">Continue Examination</h2>
    <ul role="list">
      {{ related_links }}
    </ul>
  </nav>

  <div class="governed-cta-zone" aria-label="Actions">
    {{ allowed_cta }}
  </div>

</article>
