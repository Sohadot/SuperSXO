<!-- header.html: semantic site header skeleton -->
<!-- Navigation links are populated from data/navigation.json primary and commercial_cta. -->
<!-- Do not hardcode links outside the registered route registry. -->
<header class="site-header" role="banner">

  <a href="/" class="site-identity" aria-label="SuperSXO home">
    <span class="site-name">SuperSXO</span>
  </a>

  <nav class="primary-nav" aria-label="Primary navigation">
    <ul role="list">
      {{ primary_nav_items }}
      <!-- Each item rendered as: <li><a href="{path}">{label}</a></li> -->
    </ul>
  </nav>

  <nav class="cta-nav" aria-label="Primary actions">
    {{ commercial_cta_items }}
    <!-- Each item rendered as: <a href="{path}" class="cta-link">{label}</a> -->
  </nav>

</header>
