<!-- header.html: search experience command interface -->
<!-- Navigation links derived from data/navigation.json. Do not hardcode routes. -->
<header class="command-header" role="banner">

  <div class="command-header-inner">

    <a href="/" class="authority-node" aria-label="SuperSXO — Return to command plane">
      <span class="authority-node-label">SuperSXO</span>
      <span class="authority-node-tag" aria-hidden="true">SXO</span>
    </a>

    <nav class="route-cluster" aria-label="Primary navigation">
      <ul class="route-cluster-list" role="list">
        {{ primary_nav_items }}
        <!-- Each item: <li><a href="{path}">{label}</a></li> -->
      </ul>
    </nav>

    <nav class="action-node-cluster" aria-label="Primary actions">
      {{ commercial_cta_items }}
      <!-- Each item: <a href="{path}" class="cta-link">{label}</a> -->
    </nav>

  </div>

</header>
