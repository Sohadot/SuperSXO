<!-- opening-chamber.html: case intake hero for route "/" -->
<section class="opening-chamber" aria-labelledby="case-heading">
  <div class="opening-chamber-inner">

    <div class="case-docket" aria-hidden="true">
      <span class="docket-label">Case Intake</span>
      <span class="docket-ref">DOCKET &mdash; SXO-2026 &middot; JURISDICTION: SEARCH-TO-ACTION</span>
    </div>

    <h1 id="case-heading" class="case-heading">{{ case_heading }}</h1>

    <div class="case-thesis">
      <p>{{ case_thesis }}</p>
    </div>

    <div class="case-intake-actions">
      <a class="intake-cta intake-cta--primary" href="/sxo-framework/">Enter the Framework</a>
      <a class="intake-cta intake-cta--secondary" href="/sxo-score/">Begin Assessment</a>
    </div>

  </div>

  <div class="case-intake-trail" aria-hidden="true">
    <div class="case-intake-trail-inner">
      <span>Search Intent</span>
      <span class="trail-sep">&rarr;</span>
      <span>Visibility</span>
      <span class="trail-sep">&rarr;</span>
      <span>Experience</span>
      <span class="trail-sep">&rarr;</span>
      <span>Trust</span>
      <span class="trail-sep">&rarr;</span>
      <span>Navigation</span>
      <span class="trail-sep">&rarr;</span>
      <span>Action</span>
      <span class="trail-sep">&rarr;</span>
      <span>Strategic Outcome</span>
    </div>
  </div>
</section>
