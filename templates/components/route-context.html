<!-- route-context.html: route telemetry panel -->
<!-- Displays sovereign governance metadata. Hidden from public by default. -->
<aside class="route-telemetry-panel" aria-label="Route telemetry" hidden>

  <div class="telemetry-label" aria-hidden="true">ROUTE TELEMETRY</div>

  <dl class="telemetry-grid">

    <dt class="telemetry-key">Role</dt>
    <dd class="telemetry-value" data-field="route_role">{{ route_role }}</dd>

    <dt class="telemetry-key">UX Layer</dt>
    <dd class="telemetry-value" data-field="ux_layer">{{ ux_layer }}</dd>

    <dt class="telemetry-key">Claim Level</dt>
    <dd class="telemetry-value" data-field="claim_level">{{ claim_level }}</dd>

    <dt class="telemetry-key">Monetization</dt>
    <dd class="telemetry-value" data-field="monetization_allowed">{{ monetization_allowed }}</dd>

    <dt class="telemetry-key">Status</dt>
    <dd class="telemetry-value" data-field="publication_status">{{ publication_status }}</dd>

  </dl>

</aside>
